- scope: global
  # retries: 1
  monitoring_directory: "monitoring"
  manager: "slurm"
  manager_slurm : {"partition":"dedicated"}

- scope: process
  name: "process_A"
  script: |
    #!/bin/bash
    echo "Process A running"
  manager: "slurm"
  depends_on: ["process_C"]

- scope: process
  name: "process_B"
