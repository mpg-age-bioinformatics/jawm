name: "jawm Smoke Slurm Tests"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pick-versions:
    runs-on: [self-hosted, jawm]
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          VERSIONS=("24.11.0" "24.11.2" "24.11.7" "25.05.3" "25.05.6" "25.11.0" "25.11.2")
          mapfile -t picked < <(printf "%s\n" "${VERSIONS[@]}" | shuf -n 3)

          echo "Picked versions:"
          printf '%s\n' "${picked[@]}"

          json='{"slurm_version":["'"${picked[0]}"'","'"${picked[1]}"'","'"${picked[2]}"'"]}'
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  slurm-jawm-test:
    needs: pick-versions
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.pick-versions.outputs.matrix) }}
    name: "Slurm ${{ matrix.slurm_version }}"
    runs-on: [self-hosted, jawm]

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Clone slurm-docker-cluster
        run: |
          git clone --depth=1 https://github.com/giovtorres/slurm-docker-cluster.git _slurm

      - name: Patch dnf install to be resilient (dnf --nobest)
        run: |
          cd _slurm
          find . -name 'Dockerfile*' -print0 | xargs -0 sed -i 's/dnf -y install/dnf -y --nobest install/g'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build slurm cluster images (BuildKit)
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          BUILDKIT_PROGRESS: plain
        run: |
          cd _slurm
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) TARCH=amd64 ;;
            aarch64|arm64) TARCH=arm64 ;;
            *) echo "Unsupported runner arch: $ARCH" && exit 1 ;;
          esac
          test -f .env || cp .env.example .env
          sed -i "s/^SLURM_VERSION=.*/SLURM_VERSION=${{ matrix.slurm_version }}/" .env
          docker compose build --pull --build-arg TARGETARCH="$TARCH"

      - name: Start cluster
        run: |
          cd _slurm
          docker compose up -d --no-build

      - name: Wait until Slurm nodes are ready (sinfo)
        run: |
          cd _slurm
          for i in {1..60}; do
            if docker compose exec -T slurmctld bash -lc '
              n=$(sinfo -h -o %D 2>/dev/null | tr -d "[:space:]" || true)
              n=${n:-0}
              [ "$n" -ge 1 ]
            '; then
              echo "Slurm nodes are ready"
              break
            fi
            echo "Waiting for Slurm nodes... ($i)"
            sleep 3
          done
          docker compose exec -T slurmctld bash -lc 'sinfo'

      - name: Run jawm slurm tests (base_test.py -p parameters/slurm.yaml)
        run: |
          # Copy this repo into the controller container (shared /data)
          git archive --format=tar.gz -o repo.tgz HEAD
          cd _slurm
          CID=$(docker compose ps -q slurmctld)
          docker cp ../repo.tgz "${CID}:/data/repo.tgz"

          docker compose exec -T slurmctld bash -lc '
            set -euo pipefail

            # Ensure python & pip exist in the container (safe no-op if already installed)
            command -v python3 >/dev/null 2>&1 || (
              (command -v apt-get >/dev/null 2>&1 && apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-pip) ||
              (command -v dnf >/dev/null 2>&1 && dnf -y install python3 python3-pip) ||
              (command -v yum >/dev/null 2>&1 && yum -y install python3 python3-pip) ||
              (echo "No package manager to install python3" >&2 && exit 1)
            )

            # Ensure pip exists too (some images have python but not pip)
            python3 -m pip --version >/dev/null 2>&1 || (
              (command -v apt-get >/dev/null 2>&1 && apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y python3-pip) ||
              (command -v dnf >/dev/null 2>&1 && dnf -y install python3-pip) ||
              (command -v yum >/dev/null 2>&1 && yum -y install python3-pip) ||
              (echo "pip not available after install attempt" >&2 && exit 1)
            )

            python3 --version
            python3 -m pip --version

            cd /data
            rm -rf repo && mkdir repo
            tar -xzf repo.tgz -C repo
            cd repo

            # Install jawm
            python3 -m pip install -U pip
            python3 -m pip install -e .

            # Optional: show slurm tools
            sinfo
            which sbatch
            which srun
            which sacct || true

            # Run your slurm test exactly as you do locally
            cd test
            jawm base_test.py -p parameters/slurm.yaml
          '

      - name: Logs / status (debug)
        if: always()
        run: |
          cd _slurm
          docker compose ps || true
          docker compose logs --tail=200 slurmctld || true
          docker compose logs --tail=200 slurmdbd || true

      - name: Tear down
        if: always()
        run: |
          cd _slurm
          docker compose down -v