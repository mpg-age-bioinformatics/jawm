  #         pip install -e .
  #         pip show jawm || true

  #     - name: 🧪 Run Slurm test
  #       env:
  #         SLURM_VERSION: ${{ matrix.slurm-major }}
  #       run: |
  #         source /etc/profile.d/slurm-use.sh
  #         slurm-use $SLURM_VERSION

  #         echo "🔎 Selected sbatch:"
  #         which sbatch
  #         sbatch --version

  #         echo "▶️ Running jawm Slurm test with Slurm $SLURM_VERSION.x"
  #         cd test
  #         jawm base_test.py -p parameters/slurm.yaml


  # ─────────────────────────────
  #  Git integration test
  # ─────────────────────────────
  git-tests:
    # runs-on: [self-hosted, jawm]
    runs-on: ubuntu-latest
    name: 🌐 Git integration test (Python 3.12)

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          
      - name: 🔑 Setup SSH key for GitHub access
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.JAWM_BIOINFORMATICS_KEY }}

      - name: 🧩 Trust GitHub SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: 📦 Install jawm as editable package
        run: pip install -e .

      - name: 🌐 Run Git integration test (only once)
        run: python test/git_test.py

  # ─────────────────────────────
  #  Global notification handler
  # ─────────────────────────────
  notifications:
    # runs-on: [self-hosted, jawm]
    runs-on: ubuntu-latest
    name: 🔔 Workflow Notifications
    needs: [core-tests, git-tests]  # run after both finish
    if: always()  # always run, even if one fails

    steps:
    - name: 🧾 Checkout code
      uses: actions/checkout@v6

    - name: Succeeded
      if: |
        needs.core-tests.result == 'success' &&
        needs.git-tests.result == 'success'
      run: |
        echo "✅ Smoketest Passed!"
        COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1 | tr '"' "'" | tr -d '\n')
        generate_post_data()
        {
          cat << EOF
        {
          "text": "✅ *${GITHUB_REPOSITORY##*/}@$(echo $GITHUB_SHA | cut -c 1-8)* Smoketest Passed! (${COMMIT_MSG}) ✅"
        }
        EOF
        }
        curl -H "Content-Type: application/json" -X POST -d "$(generate_post_data)" ${{ secrets.SLACK_JAWM_WEBHOOK }}

    - name: Slack Failure Notification
      if: |
        needs.core-tests.result != 'success' ||
        needs.git-tests.result != 'success'
      run: |
        echo "🚫 Smoketest FAILED!"
        COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1 | tr '"' "'" | tr -d '\n')
        generate_post_data()
        {
          cat << EOF
        {
          "text": "🚫 *${GITHUB_REPOSITORY##*/}@$(echo $GITHUB_SHA | cut -c 1-8)* Smoketest FAILED! (${COMMIT_MSG}) 🚫\n<https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View Run>"
        }
        EOF
        }
        curl -H "Content-Type: application/json" -X POST -d "$(generate_post_data)" ${{ secrets.SLACK_JAWM_WEBHOOK }}
