name: jawm Smoke Tests

on: [push, pull_request]

jobs:
  # ─────────────────────────────
  #  Local core test (matrix)
  # ─────────────────────────────
  core-tests:
    # runs-on: [self-hosted, jawm]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.13"]

    name: Python ${{ matrix.python-version }}
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install jawm as editable package
        run: |
          pip install -e .

      - name: 🧪 Run jawm smoke tests for local cases
        run: |
          echo "🔎 Python executable: $(which python)"
          echo "🔎 Python version:"
          python --version

          echo "🔎 Pip executable: $(which pip)"
          echo "🔎 Installed jawm version:"
          pip show jawm || echo 'jawm not installed?'

          echo "▶️ Running jawm with test/base_test.py"
          jawm test/base_test.py
  
  # ─────────────────────────────
  #  Slurm integration test (matrix)
  # ─────────────────────────────
