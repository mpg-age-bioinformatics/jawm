name: jawm Smoke Tests

on: [push, pull_request]

jobs:
  # ─────────────────────────────
  #  Local core test (matrix)
  # ─────────────────────────────
  core-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.13"]

    name: Python ${{ matrix.python-version }}
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install jawm as editable package
        run: |
          pip install -e .

      - name: 🧪 Run jawm smoke tests for local cases
        run: |
          python test/base_test.py

  # ─────────────────────────────
  #  Git integration test
  # ─────────────────────────────
  git-tests:
    runs-on: ubuntu-latest
    name: 🌐 Git integration test (Python 3.12)

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.
          
      - name: 🔑 Setup SSH key for GitHub access
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.JAWM_BIOINFORMATICS_KEY }}

      - name: 📦 Install jawm as editable package
        run: pip install -e .

      - name: 🌐 Run Git integration test (only once)
        run: python test/git_test.py
