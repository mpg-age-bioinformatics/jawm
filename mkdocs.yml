site_name: jawm
site_description: Just Another Workflow Manager — lightweight, Python-native workflow orchestration for local + HPC.
repo_name: mpg-age-bioinformatics/jawm
repo_url: https://github.com/mpg-age-bioinformatics/jawm
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Getting started: getting-started.md