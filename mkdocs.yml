site_name: jawm
site_description: Just Another Workflow Manager — lightweight, Python-native workflow orchestration.
repo_name: mpg-age-bioinformatics/jawm
repo_url: https://github.com/mpg-age-bioinformatics/jawm
edit_uri: edit/main/docs/

theme:
  name: material
  # name: readthedocs
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

extra_css:
  - stylesheets/style.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Process: process.md
  - Module: module.md
  - CLI Tools: cli-tools.md
  - Testing: testing.md
  - Advanced Development: development.md
  - Version Log: verson-log.md
  - Support: support.md